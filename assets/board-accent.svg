<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Decorative chess board accent</title>
  <desc id="desc">A subtle tilted checkered board used as a page accent.</desc>
  <defs>
    <pattern id="checks" width="65" height="65" patternUnits="userSpaceOnUse">
      <rect width="65" height="65" fill="#12244b"/>
      <rect width="32.5" height="32.5" fill="#d59b36"/>
      <rect x="32.5" y="32.5" width="32.5" height="32.5" fill="#d59b36"/>
    </pattern>
  </defs>
  <rect x="72" y="72" width="376" height="376" rx="28" fill="url(#checks)" opacity="0.2" transform="rotate(-12 260 260)"/>
  <rect x="72" y="72" width="376" height="376" rx="28" fill="none" stroke="#d59b36" stroke-width="10" opacity="0.36" transform="rotate(-12 260 260)"/>
</svg>
