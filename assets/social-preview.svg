<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Fairfax Chess Club social preview</title>
  <desc id="desc">A social sharing graphic with the Fairfax Chess Club name, chess board pattern, and knight logo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0" stop-color="#102349"/>
      <stop offset="1" stop-color="#050b16"/>
    </linearGradient>
    <pattern id="checks" width="86" height="86" patternUnits="userSpaceOnUse">
      <rect width="86" height="86" fill="#13244a"/>
      <rect width="43" height="43" fill="#d59b36" opacity="0.82"/>
      <rect x="43" y="43" width="43" height="43" fill="#d59b36" opacity="0.82"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="760" y="-80" width="520" height="520" rx="48" fill="url(#checks)" opacity="0.22" transform="rotate(13 1020 180)"/>
  <circle cx="150" cy="140" r="72" fill="#d59b36" opacity="0.16"/>
  <text x="90" y="270" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="900" fill="#fff6de">Fairfax Chess Club</text>
  <text x="94" y="340" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#f2c86e">Casual play. Rated games. Lessons. Community.</text>
  <text x="94" y="435" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#cdd8f2">A welcoming chess home for Fairfax players of every level.</text>
  <g transform="translate(930 300)">
    <circle cx="0" cy="0" r="130" fill="#0b1730" stroke="#f2c86e" stroke-width="12"/>
    <path d="M-54 70H54c8 0 15 7 15 15v12H-69V85c0-8 7-15 15-15Zm15-28h78c11 0 20 9 20 20v4H-59v-4c0-11 9-20 20-20Zm9-8c3-27 12-50 28-69-15-4-27-13-33-26-7-15-3-30 9-41 15-13 39-15 61-5 27 12 44 40 43 73 0 22-7 47-22 75l-7 11h-83Z" fill="#f2c86e"/>
    <circle cx="15" cy="-70" r="6" fill="#0b1730"/>
  </g>
</svg>
